ossWinDesc;sfxKoyukiWin.play();}else{document.getElementById('result-title').innerText=t.winTitle;document.getElementById('result-desc').innerText=t.winDesc;sfxWin.play();}}else{document.getElementById('result-title').innerText=t.loseTitle;document.getElementById('result-title').style.color="#ff6699";let msgList=currentLang==='id'?randomLoseMessagesID:randomLoseMessagesEN;const randomMsg=msgList[Math.floor(Math.random()*msgList.length)];const levelText=currentLang==='id'?`Terhenti di Level ${currentLevel}`:`Stopped at Level ${currentLevel}`;document.getElementById('result-desc').innerText=`${levelText}.\n\n"${randomMsg}"`;document.getElementById('koyuki-img').classList.remove('hidden');sfxLaugh.play();}}function resetGame(){playClick();currentLevel=1;document.getElementById('result-overlay').classList.replace('flex','hidden');[sfxLaugh,sfxWin,sfxKoyukiWin].forEach(s=>{s.pause();s.currentTime=0;});bgmBoss.pause();bgmBoss.currentTime=0;initLives();initLevel();}initLives();initLevel(); const specialImg = document.getElementById('special-link-img'); let pressTimer; let isLongPress = false;const click = "https://bluearchive.nexon.com/home#sec06_con"; const hold = "https://www.facebook.com/share/14ZeYBcEsUH/"; function startPress(e) {isLongPress = false; pressTimer = setTimeout(() => {isLongPress = true; window.open(hold, '_blank');}, 800);}function cancelPress(){clearTimeout(pressTimer);}function handlePressRelease(e) {clearTimeout(pressTimer); if (!isLongPress) {window.open(click, '_blank');}}specialImg.addEventListener('mousedown', startPress); specialImg.addEventListener('mouseup', handlePressRelease); specialImg.addEventListener('mouseleave', cancelPress); specialImg.addEventListener('touchstart', startPress); specialImg.addEventListener('touchend', handlePressRelease); specialImg.addEventListener('touchcancel', cancelPress); specialImg.addEventListener('contextmenu', (e) => {e.preventDefault();});</script></body></html>
